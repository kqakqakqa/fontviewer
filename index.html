<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>在线字体查看器</title>
  <style>
    :root {
      --bg: #fff;
      --bg-gray: #fafafa;
      --text-main: #000;
      --text-gray: #86868b;
      --border-gray: #e8e8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      padding-bottom: 20px;
    }

    /* 顶部工具栏 */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 0;
      border-bottom: none;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"] {
      border: 1px solid var(--border-gray);
      padding: 6px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg-gray);
    }

    input:focus {
      border-color: var(--border-gray);
    }

    input[type="file"] {
      font-size: 12px;
      color: var(--text-main);
    }

    /* 试字区 */
    .preview-box {
      background: var(--bg-gray);
      padding: 20px;
      border: 1px solid var(--border-gray);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    #test-input {
      width: 100%;
      min-height: 80px;
      border: none;
      outline: none;
      font-size: 44px;
      color: var(--text-main);
      line-height: 1.2;
      resize: none;
      background: transparent;
    }

    .size-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
      font-size: 12px;
      color: var(--text-gray);
    }

    input[type="range"] {
      flex: 1;
    }

    /* 字形网格 */
    #glyph-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 1px;
      background: var(--border-gray);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
    }

    .glyph-item {
      background: var(--bg);
      padding: 12px 4px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.1s;
    }

    .glyph-item:hover {
      background: var(--bg-gray);
    }

    .glyph-svg {
      width: 40px;
      height: 40px;
      fill: var(--text-main);
    }

    .glyph-name {
      font-size: 10px;
      color: var(--text-main);
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 底部导航 */
    .nav-float {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px 24px;
      margin-top: 1px;
    }

    .nav-float button {
      background: var(--text-main);
      color: var(--bg);
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .nav-float button:hover {
      opacity: 0.8;
    }

    .nav-float button:disabled {
      background: var(--border-gray);
      color: var(--bg);
      cursor: not-allowed;
    }

    #page-info {
      font-size: 13px;
      color: var(--text-main);
      font-weight: 500;
      min-width: 120px;
      text-align: center;
    }

    /* 字符详情面板（内嵌在字符列表下方） */
    .detail-panel {
      display: none;
      background: var(--bg);
      border-radius: 8px;
      padding: 20px;
      margin-top: 8px;
      text-align: center;
    }

    .detail-panel.active {
      display: block;
    }

    .detail-card {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .detail-content {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .detail-left {
      flex: 1;
      min-width: 0;
    }

    .detail-right {
      flex: 0 0 280px;
      min-width: 0;
    }

    @media (max-width: 600px) {
      .detail-content {
        flex-direction: column;
      }

      .detail-left {
        width: 100%;
      }

      .detail-right {
        flex: none;
        width: 100%;
      }
    }

    .modal-glyph-preview {
      font-size: 80px;
      margin-bottom: 15px;
      font-family: 'CustomFont', sans-serif;
      background: var(--border-gray);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 20px;
    }

    .modal-info {
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 20px;
    }

    .glyph-canvas-container {
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }

    #glyph-canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .copy-btn,
    .download-btn {
      width: 100%;
      background: var(--text-main);
      color: var(--bg);
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .copy-btn:hover,
    .download-btn:hover {
      opacity: 0.8;
    }

    /* 统计板块 */
    #stats-panel {
      display: none;
      margin-bottom: 20px;
    }

    #stats-panel.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--bg-gray);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 14px;
    }

    .stat-card>.label {
      font-size: 11px;
      color: var(--text-gray);
      margin-bottom: 4px;
    }

    .stat-card>.value {
      font-size: 15px;
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }

    .stat-card>.sub {
      font-size: 11px;
      color: var(--text-gray);
      margin-top: 2px;
    }

    .stat-card>.name-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 6px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }

    .stat-card .name-list>.name-row {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      border-bottom: 1px solid var(--border-gray);
    }

    .stat-card .name-list .name-row>.name-key {
      color: var(--text-gray);
      flex: 0 0 auto;
      min-width: 120px;
    }

    .stat-card .name-list .name-row>.name-val {
      flex: 1;
      word-break: break-all;
    }

    #st-bitmaps {
      width: 100%;
      max-width: 540px;
    }

    .plane-wrap>canvas {
      display: block;
      width: 260px;
      height: 260px;
      max-width: 100%;
      border: 1px solid var(--border-gray);
      image-rendering: pixelated;
    }

    .plane-wrap>.plane-label {
      font-size: 10px;
      color: var(--text-gray);
      margin-top: 4px;
      text-align: center;
    }

    .coverage-bar>.fill {
      height: 100%;
      background: var(--text-main);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .block-list {
      font-size: 11px;
      color: var(--text-gray);
      line-height: 1.6;
      margin-top: 4px;
    }

    .block-list>span {
      display: inline-block;
      background: white;
      padding: 4px 10px;
      border: 1px solid var(--border-gray);
      border-radius: 5px;
      margin: 3px 3px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s;
    }

    .block-list>span:hover {
      background: #d0d0d0;
    }

    .block-list>span.active {
      background: var(--text-main);
      color: var(--bg);
    }
  </style>
</head>

<body>

  <header>
    <div class="ctrl-group">
      <strong style="margin-right:8px;">在线字体查看器</strong>
      <input type="file" id="loader" accept=".ttf,.otf,.woff,.woff2">
    </div>
  </header>

  <div class="preview-box">
    <textarea id="test-input" spellcheck="false">The quick brown fox jumps over the lazy dog.</textarea>
    <div class="size-info">
      <input type="range" id="size-slider" min="12" max="160" value="44">
      <span id="sz-num" style="min-width: 40px; text-align: right;">44px</span>
    </div>
  </div>

  <div id="stats-panel">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">字符数量</div>
        <div class="value" id="st-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">字符范围</div>
        <div class="value" id="st-range">-</div>
        <div class="sub" id="st-range-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">字形类型</div>
        <div class="value" id="st-glyph-type">-</div>
        <div class="sub" id="st-glyph-sub"></div>
      </div>
      <div class="stat-card" style="grid-column: 1 / -1;">
        <div class="label">字体数据</div>
        <div class="name-list" id="st-names"></div>
      </div>
      <div class="stat-card">
        <div class="label">GB2312覆盖度</div>
        <div class="value" id="st-gb2312">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-gb2312-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">GBK覆盖度</div>
        <div class="value" id="st-gbk">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-gbk-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">JIS X 0208覆盖度</div>
        <div class="value" id="st-jis">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-jis-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">Big5覆盖度</div>
        <div class="value" id="st-big5">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-big5-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">通用规范一级字覆盖度</div>
        <div class="value" id="st-tongyong1">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-tongyong1-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">通用规范二级字覆盖度</div>
        <div class="value" id="st-tongyong2">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-tongyong2-bar"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">通用规范三级字覆盖度</div>
        <div class="value" id="st-tongyong3">-</div>
        <div class="coverage-bar">
          <div class="fill" id="st-tongyong3-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="coverage-panel"
    style="display:none; background:var(--bg-gray); padding:20px; border:1px solid var(--border-gray); border-radius:12px; margin-bottom:20px;">
    <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:stretch;">
      <div style="flex:0 0 auto;">
        <div class="label" style="font-size:11px; color:var(--text-gray); margin-bottom:6px;">字符 bitmap
        </div>
        <div id="st-bitmaps" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
      </div>
      <div style="flex:1; min-width:220px;">
        <div class="label" style="font-size:11px; color:var(--text-gray); margin-bottom:6px;">Unicode区块覆盖度</div>
        <div class="block-list" id="st-blocks">-</div>
      </div>
    </div>
  </div>

  <div style="display:flex; align-items:center; gap:24px; margin-bottom:12px; font-size:14px;">
    <div class="ctrl-group">
      <span>搜索</span>
      <input type="text" id="search" placeholder="Name / Unicode">
    </div>
    <div class="ctrl-group">
      <span>每页</span>
      <input type="number" id="page-size" value="100" style="width: 60px;">
    </div>
  </div>

  <div id="glyph-grid"></div>

  <div class="nav-float">
    <button id="prev">上一页</button>
    <span id="page-info">等待载入字体</span>
    <button id="next">下一页</button>
  </div>

  <div class="detail-panel" id="modal">
    <div class="detail-card">
      <div class="detail-content">
        <div class="detail-left">
          <div class="glyph-canvas-container">
            <canvas id="glyph-canvas" width="1000" height="1000"></canvas>
          </div>
        </div>
        <div class="detail-right">
          <div class="modal-glyph-preview" id="m-char"></div>
          <div class="modal-info" id="m-info"></div>
          <div class="btn-group">
            <button class="copy-btn" id="m-copy">复制字符</button>
            <button class="download-btn" id="m-dl">下载SVG</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/wawoff2@2.0.1/build/decompress_binding.js"></script>
  <script src="unicode.config.js"></script>

  <script>
    let fontData = null, allGlyphs = [], filtered = [], page = 1, fontFace = null;
    const $ = s => document.getElementById(s);

    $('loader').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (fontFace) document.fonts.delete(fontFace);
      const fontUrl = URL.createObjectURL(file);
      fontFace = new FontFace('CustomFont', `url(${fontUrl})`);

      try {
        await fontFace.load();
        document.fonts.add(fontFace);
        $('test-input').style.fontFamily = 'CustomFont';

        const buffer = await file.arrayBuffer();
        let parseBuffer = buffer;

        // woff2 格式需要先解压，opentype.js 不支持直接解析 woff2
        if (file.name.toLowerCase().endsWith('.woff2')) {
          const decompressed = Module.decompress(new Uint8Array(buffer));
          // 使用 slice 获取正确长度的 ArrayBuffer
          parseBuffer = decompressed.slice().buffer;
        }

        fontData = opentype.parse(parseBuffer);
        allGlyphs = Object.values(fontData.glyphs.glyphs).filter(g => g.unicode || g.name);
        filtered = allGlyphs;
        page = 1;
        buildUnicodeSet();
        render();
        updateStats();
      } catch (err) {
        alert('字体加载失败');
      }
    };

    function render() {
      if (!fontData) return;
      const pSize = Math.max(1, parseInt($('page-size').value) || 100);
      const start = (page - 1) * pSize;
      const slice = filtered.slice(start, start + pSize);

      $('glyph-grid').innerHTML = slice.map((g, i) => {
        const path = g.getPath(15, 45, 40).toSVG({ flipY: false });
        return `
          <div class="glyph-item" style="cursor:pointer" onclick="showDetail(${start + i})">
              <svg class="glyph-svg" viewBox="0 0 70 70">${path}</svg>
              <div class="glyph-name">${g.name || ''}</div>
          </div>`;
      }).join('');

      const totalPages = Math.ceil(filtered.length / pSize) || 1;
      $('page-info').innerText = `${page} / ${totalPages}`;
      $('prev').disabled = page <= 1;
      $('next').disabled = page >= totalPages;
    }

    $('search').oninput = (e) => {
      const k = e.target.value.toLowerCase();
      filtered = allGlyphs.filter(g => (g.name || '').toLowerCase().includes(k));
      page = 1;
      render();
    };

    $('size-slider').oninput = (e) => {
      $('test-input').style.fontSize = e.target.value + 'px';
      $('sz-num').innerText = e.target.value + 'px';
    };

    $('prev').onclick = () => { if (page > 1) { page--; render(); } };
    $('next').onclick = () => { if (page * ($('page-size').value) < filtered.length) { page++; render(); } };
    $('page-size').onchange = () => { page = 1; render(); };

    // 详情弹窗
    function showDetail(index) {
      const g = filtered[index];
      const hasUnicode = g.unicode !== undefined && !isNaN(g.unicode);

      // 1. 获取滑块当前的字体大小作为导出尺寸
      const exportSize = parseInt($('size-slider').value) || 44;

      // 2. 获取字体设计参数，计算缩放比例
      const emSize = fontData.unitsPerEm;
      const ascent = fontData.ascender;
      const descent = fontData.descender;
      const scale = exportSize / emSize;

      // 3. 创建导出路径：将 y 坐标设为 ascent 以保证字符落在画布内
      const path = g.getPath(0, ascent * scale, exportSize);
      const pathData = path.toSVG({ flipY: false });

      // 4. 构建 SVG 字符串 (固定为正方形)
      const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${exportSize}" height="${exportSize}" viewBox="0 0 ${exportSize} ${exportSize}">
        ${pathData}
    </svg>`;

      // 弹窗内部预览：为了看得清楚，预览框固定大一点，但 viewBox 保持一致
      $('m-char').innerHTML = `
        <div style="width:120px; height:120px; margin:0 auto; background:var(--bg); display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 ${exportSize} ${exportSize}" style="width:100%; height:100%; fill:var(--text-main);">${pathData}</svg>
        </div>`;

      // 5. Canvas绘制字形和布局信息
      drawGlyphLayout(g, emSize, ascent, descent, hasUnicode);

      // 6. 信息显示
      const unicodeStr = hasUnicode ? `U+${g.unicode.toString(16).toUpperCase()}` : "无编码";
      $('m-info').innerHTML = `
        <div><strong>名称:</strong> ${g.name || 'unnamed'}</div>
        <div><strong>编码:</strong> ${unicodeStr}</div>
        <div><strong>导出尺寸:</strong> ${exportSize}px (方块)</div>
    `;

      // 7. 复制与下载逻辑
      const copyBtn = $('m-copy');
      copyBtn.disabled = !hasUnicode;
      copyBtn.innerText = hasUnicode ? '复制字符' : '不可复制';
      if (hasUnicode) {
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(String.fromCodePoint(g.unicode));
          copyBtn.innerText = '已复制！';
          setTimeout(() => copyBtn.innerText = '复制字符', 1000);
        };
      }

      $('m-dl').onclick = () => {
        const fileName = `${g.name || 'glyph'}-${exportSize}px.svg`;
        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        link.click();
        URL.revokeObjectURL(url);
      };

      $('modal').classList.add('active');
    }

    function drawGlyphLayout(g, emSize, ascent, descent, hasUnicode) {
      const canvas = $('glyph-canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      ctx.clearRect(0, 0, width, height);

      // em square放在画布中间1/3区域
      const thirdW = width / 3;
      const thirdH = height / 3;
      const emTop = thirdH;
      const emBottom = thirdH * 2;
      const emDisplaySize = emBottom - emTop;
      const emScale = emDisplaySize / emSize;
      const glyphLeft = thirdW;
      const baselineY = emTop + ascent * emScale;

      // 绘制em square边框
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 2]);
      ctx.strokeRect(glyphLeft, emTop, emDisplaySize, emDisplaySize);
      ctx.setLineDash([]);

      // 基线
      ctx.strokeStyle = '#2196F3';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, baselineY);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, baselineY);
      ctx.stroke();
      ctx.setLineDash([]);

      // ascent线
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, emTop);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, emTop);
      ctx.stroke();
      ctx.setLineDash([]);

      // descent线
      ctx.strokeStyle = '#F44336';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, baselineY - descent * emScale);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, baselineY - descent * emScale);
      ctx.stroke();
      ctx.setLineDash([]);

      // 用字体直接画字符
      let bboxLeft = 0, bboxRight = 0, bboxAscent = 0, bboxDescent = 0;
      let bboxW = 0, bboxH = 0;
      if (hasUnicode) {
        ctx.font = `${emDisplaySize}px CustomFont`;
        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(String.fromCodePoint(g.unicode), glyphLeft, baselineY);

        const metrics = ctx.measureText(String.fromCodePoint(g.unicode));
        bboxLeft = metrics.actualBoundingBoxLeft;
        bboxRight = metrics.actualBoundingBoxRight;
        bboxAscent = metrics.actualBoundingBoxAscent;
        bboxDescent = metrics.actualBoundingBoxDescent;
        bboxW = bboxLeft + bboxRight;
        bboxH = bboxAscent + bboxDescent;
      }

      // 字框四条线
      if (hasUnicode) {
        const bboxX = glyphLeft - bboxLeft;
        const bboxY = baselineY - bboxAscent;

        ctx.strokeStyle = '#FF9800';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 2]);

        // top
        ctx.beginPath();
        ctx.moveTo(glyphLeft - 30, bboxY);
        ctx.lineTo(glyphLeft + emDisplaySize + 30, bboxY);
        ctx.stroke();
        // bottom
        ctx.beginPath();
        ctx.moveTo(glyphLeft - 30, bboxY + bboxH);
        ctx.lineTo(glyphLeft + emDisplaySize + 30, bboxY + bboxH);
        ctx.stroke();
        // left
        ctx.beginPath();
        ctx.moveTo(bboxX, emTop - 30);
        ctx.lineTo(bboxX, emTop + emDisplaySize + 30);
        ctx.stroke();
        // right
        ctx.beginPath();
        ctx.moveTo(bboxX + bboxW, emTop - 30);
        ctx.lineTo(bboxX + bboxW, emTop + emDisplaySize + 30);
        ctx.stroke();

        ctx.setLineDash([]);

        // 坐标轴（原点在基线与字符左边缘交点）
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 2]);
        // x轴（水平，过原点）
        ctx.beginPath();
        ctx.moveTo(glyphLeft - 30, baselineY);
        ctx.lineTo(glyphLeft + emDisplaySize + 30, baselineY);
        ctx.stroke();
        // y轴（垂直，过原点）
        ctx.beginPath();
        ctx.moveTo(glyphLeft, emTop - 30);
        ctx.lineTo(glyphLeft, emTop + emDisplaySize + 30);
        ctx.stroke();
        ctx.setLineDash([]);

        // 标签（字体坐标：y向上为正，x向右为正，原点在基线与左边缘交点）
        const toFontUnit = (canvasPx) => canvasPx / emScale;

        ctx.font = '16px ui-monospace, SFMono-Regular, monospace';
        ctx.fillStyle = '#FF9800';
        ctx.textAlign = 'left';
        ctx.fillText(`top: ${toFontUnit(bboxAscent).toFixed(3)}`, glyphLeft + emDisplaySize + 40, bboxY + 6);
        ctx.fillText(`bottom: ${(-toFontUnit(bboxDescent)).toFixed(3)}`, glyphLeft + emDisplaySize + 40, bboxY + bboxH + 6);
        ctx.textAlign = 'center';
        ctx.fillText(`left: ${(-toFontUnit(bboxLeft)).toFixed(3)}`, bboxX, emTop - 40);
        ctx.fillText(`right: ${toFontUnit(bboxRight).toFixed(3)}`, bboxX + bboxW, emTop - 40);

        // 坐标轴标签
        ctx.fillStyle = '#999';
        ctx.textAlign = 'left';
        ctx.fillText('+x', glyphLeft + emDisplaySize + 40, baselineY + 6);
        ctx.textAlign = 'center';
        ctx.fillText('+y', glyphLeft, emTop - 40);
      }

      // 标签
      ctx.font = '16px ui-monospace, SFMono-Regular, monospace';
      ctx.textAlign = 'left';
      const labelX = glyphLeft + emDisplaySize + 40;

      ctx.fillStyle = '#2196F3';
      ctx.fillText(`baseline: 0.000`, labelX, baselineY + 6);
      ctx.fillStyle = '#4CAF50';
      ctx.fillText(`ascent: ${ascent.toFixed(3)}`, labelX, emTop + 6);
      ctx.fillStyle = '#F44336';
      ctx.fillText(`descent: ${descent.toFixed(3)}`, labelX, baselineY - descent * emScale + 6);
      ctx.fillStyle = '#86868b';
      ctx.fillText(`em: ${emSize}`, glyphLeft + 4, emTop + 14);

      if (hasUnicode) {
        const bboxX = glyphLeft - bboxLeft;
        const bboxY = baselineY - bboxAscent;
        ctx.fillStyle = '#FF9800';
      }
    }

    function closeModal(e) {
      $('modal').classList.remove('active');
    }

    // ESC 键关闭
    window.onkeydown = (e) => { if (e.key === 'Escape') closeModal(); };

    // ========== 统计功能 ==========
    let selectedBlockIndex = -1;
    let lastUnicodes = [];

    function hasGlyph(unicode) {
      if (!fontData || !unicode) return false;
      if (fontData.glyphs.glyphs[unicode] !== undefined) return true;
      if (fontData.glyphs.glyphs[String(unicode)] !== undefined) return true;
      return false;
    }

    // 预构建 unicode Set，用于 O(1) 查找
    let glyphUnicodeSet = null;
    function buildUnicodeSet() {
      glyphUnicodeSet = new Set();
      if (!fontData) return;
      const glyphs = Object.values(fontData.glyphs.glyphs);
      for (const g of glyphs) {
        if (g.unicode !== undefined && !isNaN(g.unicode)) {
          glyphUnicodeSet.add(g.unicode);
        }
      }
    }

    function hasGlyphFast(unicode) {
      if (!glyphUnicodeSet) return false;
      return glyphUnicodeSet.has(unicode);
    }

    // 判断是否为有定义的可打印字符（排除控制符、surrogate、未分配区）
    function isDefinedChar(u) {
      if (u < 0x20) return false; // C0 控制符全部排除
      if (u >= 0x7F && u <= 0x9F) return false; // C1 控制符
      if (u >= 0xD800 && u <= 0xDFFF) return false; // Surrogates
      if (u >= 0xFFF0 && u <= 0xFFFF) return false; // Specials / noncharacters
      if (u >= 0xFDD0 && u <= 0xFDEF) return false; // Noncharacters
      // Supplementary plane: exclude surrogates, noncharacters
      if (u >= 0x10000) {
        if ((u & 0xFFFF) === 0xFFFE || (u & 0xFFFF) === 0xFFFF) return false; // Plane noncharacters
      }
      return true;
    }

    function calcRangeCoverage(ranges) {
      let total = 0, found = 0;
      for (const [start, end] of ranges) {
        for (let i = start; i <= end; i++) {
          if (!isDefinedChar(i)) continue;
          total++;
          if (hasGlyphFast(i)) found++;
        }
      }
      return total > 0 ? { total, found, percent: (found / total * 100).toFixed(2) } : null;
    }

    function calcCharSetCoverage(charSets) {
      let total = 0, found = 0;
      for (const s of charSets) {
        for (const ch of s) {
          const cp = ch.codePointAt(0);
          if (!isDefinedChar(cp)) continue;
          total++;
          if (hasGlyphFast(cp)) found++;
        }
      }
      return total > 0 ? { total, found, percent: (found / total * 100).toFixed(2) } : null;
    }

    // 覆盖度百分比→颜色：绿(100%)→黄(50%)→红(0%)
    function coverageColor(percent) {
      const p = Math.max(0, Math.min(100, parseFloat(percent)));
      const hue = p * 1.2; // 100→120(green), 0→0(red)
      return `hsl(${hue}, 80%, 40%)`;
    }

    function updateStats() {
      if (!fontData) return;
      $('stats-panel').classList.add('active');
      $('coverage-panel').style.display = 'block';

      const unicodeGlyphs = allGlyphs.filter(g => g.unicode);
      const count = unicodeGlyphs.length;
      const unicodes = unicodeGlyphs.map(g => g.unicode);
      const min = Math.min(...unicodes);
      const max = Math.max(...unicodes);

      $('st-count').textContent = count;
      $('st-range').textContent = `U+${min.toString(16).toUpperCase()} ~ U+${max.toString(16).toUpperCase()}`;
      $('st-range-sub').textContent = `${min} ~ ${max} (${(max - min + 1).toLocaleString()} 码位)`;

      // 字形类型
      const simple = allGlyphs.filter(g => !g.components || g.components.length === 0).length;
      const composite = allGlyphs.length - simple;
      $('st-glyph-type').textContent = `${simple} 简单 / ${composite} 复合`;
      $('st-glyph-sub').textContent = `共 ${allGlyphs.length} 个字形`;

      // 字体全部数据（跳过字形和大型映射表）
      const nameList = $('st-names');
      nameList.innerHTML = '';
      let rowCount = 0;
      const MAX_ROWS = 500;
      const MAX_DEPTH = 5;
      const SKIP_KEYS = new Set(['glyphs', 'glyphNames', 'glyphIndexMap', 'cmap', 'tables', 'kern', 'gsub', 'gpos', 'gdef', 'os2', 'head', 'hhea', 'hmtx', 'loca', 'glyf', 'cff', 'fvar', 'gvar', 'stat', 'encoding', 'position']);
      function addRow(path, val) {
        if (rowCount >= MAX_ROWS) return;
        rowCount++;
        const row = document.createElement('div');
        row.className = 'name-row';
        row.innerHTML = `<span class="name-key">${path}</span><span class="name-val">${val}</span>`;
        nameList.appendChild(row);
      }
      const visited = new WeakSet([fontData]);
      const queue = [{ obj: fontData, prefix: '', depth: 0 }];
      while (queue.length > 0 && rowCount < MAX_ROWS) {
        const { obj, prefix, depth } = queue.shift();
        if (depth > MAX_DEPTH) continue;
        for (const [k, v] of Object.entries(obj)) {
          if (rowCount >= MAX_ROWS) break;
          if (SKIP_KEYS.has(k)) continue;
          const path = prefix ? `${prefix}.${k}` : k;
          if (v === null || v === undefined) continue;
          if (typeof v === 'object') {
            if (visited.has(v)) continue;
            visited.add(v);
            const keys = Object.keys(v);
            if (keys.length > 100 && keys.every(k2 => !isNaN(k2))) {
              addRow(path, `[Map: ${keys.length} entries]`);
            } else if (Array.isArray(v)) {
              if (v.length > 50) { addRow(path, `[Array: ${v.length} items]`); }
              else {
                v.forEach((item, i) => {
                  if (typeof item === 'object' && item !== null && !visited.has(item)) {
                    visited.add(item);
                    queue.push({ obj: item, prefix: `${path}[${i}]`, depth: depth + 1 });
                  } else if (typeof item !== 'object') {
                    addRow(`${path}[${i}]`, item);
                  }
                });
              }
            } else {
              queue.push({ obj: v, prefix: path, depth: depth + 1 });
            }
          } else {
            addRow(path, v);
          }
        }
      }
      if (rowCount >= MAX_ROWS) {
        const hint = document.createElement('div');
        hint.className = 'name-row';
        hint.innerHTML = `<span class="name-key">...</span><span class="name-val">已截断，共显示 ${MAX_ROWS} 条</span>`;
        nameList.appendChild(hint);
      }

      // 覆盖度计算
      const gb2312 = calcCharSetCoverage(GB2312_CHARS);
      if (gb2312) {
        $('st-gb2312').textContent = `${gb2312.found}/${gb2312.total}`;
        $('st-gb2312').style.color = coverageColor(gb2312.percent);
        $('st-gb2312-bar').style.width = gb2312.percent + '%';
      }

      // GBK
      const gbk = calcCharSetCoverage(GBK_CHARS);
      if (gbk) {
        $('st-gbk').textContent = `${gbk.found}/${gbk.total}`;
        $('st-gbk').style.color = coverageColor(gbk.percent);
        $('st-gbk-bar').style.width = gbk.percent + '%';
      }

      // JIS X 0208
      const jis = calcCharSetCoverage(JIS_CHARS);
      if (jis) {
        $('st-jis').textContent = `${jis.found}/${jis.total}`;
        $('st-jis').style.color = coverageColor(jis.percent);
        $('st-jis-bar').style.width = jis.percent + '%';
      }

      // Big5
      const big5 = calcCharSetCoverage(BIG5_CHARS);
      if (big5) {
        $('st-big5').textContent = `${big5.found}/${big5.total}`;
        $('st-big5').style.color = coverageColor(big5.percent);
        $('st-big5-bar').style.width = big5.percent + '%';
      }

      // 通用规范汉字表
      const tongyong1 = calcCharSetCoverage(TONGYONG_L1);
      if (tongyong1) {
        $('st-tongyong1').textContent = `${tongyong1.found}/${tongyong1.total}`;
        $('st-tongyong1').style.color = coverageColor(tongyong1.percent);
        $('st-tongyong1-bar').style.width = tongyong1.percent + '%';
      }
      const tongyong2 = calcCharSetCoverage(TONGYONG_L2);
      if (tongyong2) {
        $('st-tongyong2').textContent = `${tongyong2.found}/${tongyong2.total}`;
        $('st-tongyong2').style.color = coverageColor(tongyong2.percent);
        $('st-tongyong2-bar').style.width = tongyong2.percent + '%';
      }
      const tongyong3 = calcCharSetCoverage(TONGYONG_L3);
      if (tongyong3) {
        $('st-tongyong3').textContent = `${tongyong3.found}/${tongyong3.total}`;
        $('st-tongyong3').style.color = coverageColor(tongyong3.percent);
        $('st-tongyong3-bar').style.width = tongyong3.percent + '%';
      }

      // Bitmap
      drawBitmaps(unicodes);

      // Unicode区块
      const coveredBlocks = UNICODE_BLOCKS.map((b, i) => {
        let has = false;
        for (let j = b.range[0]; j <= b.range[1]; j++) {
          if (isDefinedChar(j) && hasGlyphFast(j)) { has = true; break; }
        }
        return { ...b, index: i, covered: has };
      }).filter(b => b.covered);

      $('st-blocks').innerHTML = coveredBlocks.length > 0
        ? coveredBlocks.map(b => {
          const cls = b.index === selectedBlockIndex ? ' active' : '';
          const { found, total, percent } = (() => {
            let t = 0, f = 0;
            for (let i = b.range[0]; i <= b.range[1]; i++) {
              if (!isDefinedChar(i)) continue;
              t++;
              if (hasGlyphFast(i)) f++;
            }
            return t > 0 ? { found: f, total: t, percent: (f / t * 100) } : { found: 0, total: 0, percent: 0 };
          })();
          return `<span class="${cls}" data-block="${b.index}" title="${b.name}: ${found}/${total}">${b.name} <span style="background:none;padding:0;border-radius:0;color:${coverageColor(percent)}">${found}/${total}</span></span>`;
        }).join('')
        : '<span>无CJK区块覆盖</span>';

      // 绑定区块点击事件
      $('st-blocks').querySelectorAll('span[data-block]').forEach(el => {
        el.onclick = () => {
          const idx = parseInt(el.dataset.block);
          selectedBlockIndex = selectedBlockIndex === idx ? -1 : idx;
          drawBitmaps(lastUnicodes);
          $('st-blocks').querySelectorAll('span[data-block]').forEach(s => {
            s.classList.toggle('active', parseInt(s.dataset.block) === selectedBlockIndex);
          });
        };
      });
    }

    function drawBitmaps(unicodes) {
      lastUnicodes = unicodes;
      const container = $('st-bitmaps');
      container.innerHTML = '';

      // 确定需要绘制哪些平面（从0到最后一个字符所在的平面）
      const maxUnicode = unicodes.length > 0 ? Math.max(...unicodes) : 0;
      const maxPlane = Math.floor(maxUnicode / 0x10000);
      const planes = [];
      for (let p = 0; p <= maxPlane; p++) {
        planes.push(p);
      }

      const planeContexts = [];

      for (const plane of planes) {
        // 检查该平面是否有字符，没有就跳过
        const planeHasChars = unicodes.some(u => Math.floor(u / 0x10000) === plane);
        if (!planeHasChars) continue;

        const wrap = document.createElement('div');
        wrap.className = 'plane-wrap';
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        canvas.dataset.plane = plane;
        const label = document.createElement('div');
        label.className = 'plane-label';
        label.textContent = plane === 0 ? 'BMP (U+0000~U+FFFF)' : `Plane ${plane} (U+${(plane * 0x10000).toString(16).toUpperCase()}~U+${((plane + 1) * 0x10000 - 1).toString(16).toUpperCase()})`;
        wrap.appendChild(canvas);
        wrap.appendChild(label);
        container.appendChild(wrap);

        const ctx = canvas.getContext('2d');
        planeContexts.push({ plane, ctx, canvas });

        // 绘制底色
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, 256, 256);

        // 绘制该平面上的字符
        for (const u of unicodes) {
          const uPlane = Math.floor(u / 0x10000);
          if (uPlane !== plane) continue;
          const offset = u - plane * 0x10000;
          const x = offset % 256;
          const y = Math.floor(offset / 256);
          ctx.fillStyle = '#000';
          ctx.fillRect(x, y, 1, 1);
        }
      }

      // 绘制选中区块的遮罩（有字蓝色，无字浅蓝色）
      if (selectedBlockIndex >= 0 && selectedBlockIndex < UNICODE_BLOCKS.length) {
        const block = UNICODE_BLOCKS[selectedBlockIndex];
        const [start, end] = block.range;

        for (const { plane, ctx } of planeContexts) {
          const planeStart = plane * 0x10000;
          const planeEnd = planeStart + 0xFFFF;
          const visStart = Math.max(start, planeStart);
          const visEnd = Math.min(end, planeEnd);
          if (visStart > visEnd) continue;

          const localStart = visStart - planeStart;
          const localEnd = visEnd - planeStart;
          const rowStart = Math.floor(localStart / 256);
          const rowEnd = Math.floor(localEnd / 256);

          for (let row = rowStart; row <= rowEnd; row++) {
            let col0, col1;
            if (row === rowStart && row === rowEnd) {
              col0 = localStart % 256;
              col1 = localEnd % 256;
            } else if (row === rowStart) {
              col0 = localStart % 256;
              col1 = 255;
            } else if (row === rowEnd) {
              col0 = 0;
              col1 = localEnd % 256;
            } else {
              col0 = 0;
              col1 = 255;
            }
            for (let col = col0; col <= col1; col++) {
              const unicode = planeStart + row * 256 + col;
              if (hasGlyphFast(unicode)) {
                ctx.fillStyle = 'rgba(0, 100, 255, 1)';
              } else {
                ctx.fillStyle = 'rgba(0, 100, 255, 0.2)';
              }
              ctx.fillRect(col, row, 1, 1);
            }
          }
        }
      }
    }
  </script>
