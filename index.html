<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>在线字体查看器</title>
  <style>
    :root {
      --bg: #fff;
      --bg-gray: #fafafa;
      --text-main: #000;
      --text-gray: #86868b;
      --border-gray: #e8e8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      padding-bottom: 20px;
    }

    /* 顶部工具栏 */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 0;
      border-bottom: none;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"] {
      border: 1px solid var(--border-gray);
      padding: 6px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg-gray);
    }

    input:focus {
      border-color: var(--border-gray);
    }

    input[type="file"] {
      font-size: 12px;
      color: var(--text-main);
    }

    /* 试字区 */
    .preview-box {
      background: var(--bg-gray);
      padding: 20px;
      border: 1px solid var(--border-gray);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    #test-input {
      width: 100%;
      min-height: 80px;
      border: none;
      outline: none;
      font-size: 44px;
      color: var(--text-main);
      line-height: 1.2;
      resize: none;
      background: transparent;
    }

    .size-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
      font-size: 12px;
      color: var(--text-gray);
    }

    input[type="range"] {
      flex: 1;
    }

    /* 字形网格 */
    #glyph-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 1px;
      background: var(--border-gray);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
    }

    .glyph-item {
      background: var(--bg);
      padding: 12px 4px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.1s;
    }

    .glyph-item:hover {
      background: var(--bg-gray);
    }

    .glyph-svg {
      width: 40px;
      height: 40px;
      fill: var(--text-main);
    }

    .glyph-name {
      font-size: 10px;
      color: var(--text-main);
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 底部导航 */
    .nav-float {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px 24px;
      margin-top: 1px;
    }

    .nav-float button {
      background: var(--text-main);
      color: var(--bg);
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .nav-float button:hover {
      opacity: 0.8;
    }

    .nav-float button:disabled {
      background: var(--border-gray);
      color: var(--bg);
      cursor: not-allowed;
    }

    #page-info {
      font-size: 13px;
      color: var(--text-main);
      font-weight: 500;
      min-width: 120px;
      text-align: center;
    }

    /* 字符详情面板（内嵌在字符列表下方） */
    .detail-panel {
      display: none;
      background: var(--bg);
      border-radius: 8px;
      padding: 20px;
      margin-top: 8px;
      text-align: center;
    }

    .detail-panel.active {
      display: block;
    }

    .detail-card {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .detail-content {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .detail-left {
      flex: 1;
      min-width: 0;
    }

    .detail-right {
      flex: 0 0 280px;
      min-width: 0;
    }

    @media (max-width: 600px) {
      .detail-content {
        flex-direction: column;
      }
      
      .detail-left {
        width: 100%;
      }
      
      .detail-right {
        flex: none;
        width: 100%;
      }
    }

    .modal-glyph-preview {
      font-size: 80px;
      margin-bottom: 15px;
      font-family: 'CustomFont', sans-serif;
      background: var(--border-gray);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 20px;
    }

    .modal-info {
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 20px;
    }

    .glyph-canvas-container {
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }

    #glyph-canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .copy-btn,
    .download-btn {
      width: 100%;
      background: var(--text-main);
      color: var(--bg);
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .copy-btn:hover,
    .download-btn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <header>
    <div class="ctrl-group">
      <strong style="margin-right:8px;">在线字体查看器</strong>
      <input type="file" id="loader" accept=".ttf,.otf,.woff,.woff2">
    </div>
    <div class="ctrl-group">
      <span>搜索</span>
      <input type="text" id="search" placeholder="Name / Unicode">
    </div>
    <div class="ctrl-group">
      <span>每页</span>
      <input type="number" id="page-size" value="100" style="width: 60px;">
    </div>
  </header>

  <div class="preview-box">
    <textarea id="test-input" spellcheck="false">The quick brown fox jumps over the lazy dog.</textarea>
    <div class="size-info">
      <input type="range" id="size-slider" min="12" max="160" value="44">
      <span id="sz-num" style="min-width: 40px; text-align: right;">44px</span>
    </div>
  </div>

  <div id="glyph-grid"></div>

  <div class="nav-float">
    <button id="prev">上一页</button>
    <span id="page-info">等待载入字体</span>
    <button id="next">下一页</button>
  </div>

  <div class="detail-panel" id="modal">
    <div class="detail-card">
      <div class="detail-content">
        <div class="detail-left">
          <div class="glyph-canvas-container">
            <canvas id="glyph-canvas" width="1000" height="1000"></canvas>
          </div>
        </div>
        <div class="detail-right">
          <div class="modal-glyph-preview" id="m-char"></div>
          <div class="modal-info" id="m-info"></div>
          <div class="btn-group">
            <button class="copy-btn" id="m-copy">复制字符</button>
            <button class="download-btn" id="m-dl">下载SVG</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/wawoff2@2.0.1/build/decompress_binding.js"></script>

  <script>
    let fontData = null, allGlyphs = [], filtered = [], page = 1, fontFace = null;
    const $ = s => document.getElementById(s);

    $('loader').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (fontFace) document.fonts.delete(fontFace);
      const fontUrl = URL.createObjectURL(file);
      fontFace = new FontFace('CustomFont', `url(${fontUrl})`);

      try {
        await fontFace.load();
        document.fonts.add(fontFace);
        $('test-input').style.fontFamily = 'CustomFont';

        const buffer = await file.arrayBuffer();
        let parseBuffer = buffer;

        // woff2 格式需要先解压，opentype.js 不支持直接解析 woff2
        if (file.name.toLowerCase().endsWith('.woff2')) {
          const decompressed = Module.decompress(new Uint8Array(buffer));
          // 使用 slice 获取正确长度的 ArrayBuffer
          parseBuffer = decompressed.slice().buffer;
        }

        fontData = opentype.parse(parseBuffer);
        allGlyphs = Object.values(fontData.glyphs.glyphs).filter(g => g.unicode || g.name);
        filtered = allGlyphs;
        page = 1;
        render();
      } catch (err) {
        alert('字体加载失败');
      }
    };

    function render() {
      if (!fontData) return;
      const pSize = Math.max(1, parseInt($('page-size').value) || 100);
      const start = (page - 1) * pSize;
      const slice = filtered.slice(start, start + pSize);

      $('glyph-grid').innerHTML = slice.map((g, i) => {
        const path = g.getPath(15, 45, 40).toSVG({ flipY: false });
        return `
          <div class="glyph-item" style="cursor:pointer" onclick="showDetail(${start + i})">
              <svg class="glyph-svg" viewBox="0 0 70 70">${path}</svg>
              <div class="glyph-name">${g.name || ''}</div>
          </div>`;
      }).join('');

      const totalPages = Math.ceil(filtered.length / pSize) || 1;
      $('page-info').innerText = `${page} / ${totalPages}`;
      $('prev').disabled = page <= 1;
      $('next').disabled = page >= totalPages;
    }

    $('search').oninput = (e) => {
      const k = e.target.value.toLowerCase();
      filtered = allGlyphs.filter(g => (g.name || '').toLowerCase().includes(k));
      page = 1;
      render();
    };

    $('size-slider').oninput = (e) => {
      $('test-input').style.fontSize = e.target.value + 'px';
      $('sz-num').innerText = e.target.value + 'px';
    };

    $('prev').onclick = () => { if (page > 1) { page--; render(); } };
    $('next').onclick = () => { if (page * ($('page-size').value) < filtered.length) { page++; render(); } };
    $('page-size').onchange = () => { page = 1; render(); };

    // 详情弹窗
    function showDetail(index) {
      const g = filtered[index];
      const hasUnicode = g.unicode !== undefined && !isNaN(g.unicode);

      // 1. 获取滑块当前的字体大小作为导出尺寸
      const exportSize = parseInt($('size-slider').value) || 44;

      // 2. 获取字体设计参数，计算缩放比例
      const emSize = fontData.unitsPerEm;
      const ascender = fontData.ascender;
      const descender = fontData.descender;
      const scale = exportSize / emSize;

      // 3. 创建导出路径：将 y 坐标设为 ascender 以保证字符落在画布内
      const path = g.getPath(0, ascender * scale, exportSize);
      const pathData = path.toSVG({ flipY: false });

      // 4. 构建 SVG 字符串 (固定为正方形)
      const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${exportSize}" height="${exportSize}" viewBox="0 0 ${exportSize} ${exportSize}">
        ${pathData}
    </svg>`;

      // 弹窗内部预览：为了看得清楚，预览框固定大一点，但 viewBox 保持一致
      $('m-char').innerHTML = `
        <div style="width:120px; height:120px; margin:0 auto; background:var(--bg); display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 ${exportSize} ${exportSize}" style="width:100%; height:100%; fill:var(--text-main);">${pathData}</svg>
        </div>`;

      // 5. Canvas绘制字形和布局信息
      drawGlyphLayout(g, emSize, ascender, descender, hasUnicode);

      // 6. 信息显示
      const unicodeStr = hasUnicode ? `U+${g.unicode.toString(16).toUpperCase()}` : "无编码";
      $('m-info').innerHTML = `
        <div><strong>名称:</strong> ${g.name || 'unnamed'}</div>
        <div><strong>编码:</strong> ${unicodeStr}</div>
        <div><strong>导出尺寸:</strong> ${exportSize}px (方块)</div>
    `;

      // 7. 复制与下载逻辑
      const copyBtn = $('m-copy');
      copyBtn.disabled = !hasUnicode;
      copyBtn.innerText = hasUnicode ? '复制字符' : '不可复制';
      if (hasUnicode) {
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(String.fromCodePoint(g.unicode));
          copyBtn.innerText = '已复制！';
          setTimeout(() => copyBtn.innerText = '复制字符', 1000);
        };
      }

      $('m-dl').onclick = () => {
        const fileName = `${g.name || 'glyph'}-${exportSize}px.svg`;
        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        link.click();
        URL.revokeObjectURL(url);
      };

      $('modal').classList.add('active');
    }

    function drawGlyphLayout(g, emSize, ascender, descender, hasUnicode) {
      const canvas = $('glyph-canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      
      ctx.clearRect(0, 0, width, height);
      
      // em square放在画布中间1/3区域
      const thirdW = width / 3;
      const thirdH = height / 3;
      const emTop = thirdH;
      const emBottom = thirdH * 2;
      const emDisplaySize = emBottom - emTop;
      const emScale = emDisplaySize / emSize;
      const glyphLeft = thirdW;
      const baselineY = emTop + ascender * emScale;
      
      // 绘制em square边框
      ctx.strokeStyle = '#e8e8e8';
      ctx.lineWidth = 1;
      ctx.strokeRect(glyphLeft, emTop, emDisplaySize, emDisplaySize);
      
      // 基线
      ctx.strokeStyle = '#000';
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, baselineY);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, baselineY);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // ascender线
      ctx.strokeStyle = '#4CAF50';
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, emTop);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, emTop);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // descender线
      ctx.strokeStyle = '#F44336';
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(glyphLeft - 30, emBottom);
      ctx.lineTo(glyphLeft + emDisplaySize + 30, emBottom);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // 用字体直接画字符
      if (hasUnicode) {
        ctx.font = `${emDisplaySize}px CustomFont`;
        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(String.fromCodePoint(g.unicode), glyphLeft, baselineY);
      }
      
      // 标签
      ctx.font = '16px ui-monospace, SFMono-Regular, monospace';
      ctx.fillStyle = '#86868b';
      ctx.textAlign = 'left';
      const labelX = glyphLeft + emDisplaySize + 40;
      
      ctx.fillText('baseline', labelX, baselineY + 6);
      ctx.fillText(`ascender: ${ascender}`, labelX, emTop + 6);
      ctx.fillText(`descender: ${descender}`, labelX, emBottom + 6);
      ctx.fillText(`em: ${emSize}`, labelX, emTop + emDisplaySize / 2 + 6);
    }

    function closeModal(e) {
      $('modal').classList.remove('active');
    }

    // ESC 键关闭
    window.onkeydown = (e) => { if (e.key === 'Escape') closeModal(); };
  </script>

</body>

</html>
